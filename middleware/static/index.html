<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Peel</title>
    <meta name="description" content="Search YouTube, download, and stream your personal music library.">

    <!-- Phosphor Icons (self-hosted: regular, fill, bold weights) -->
    <link rel="stylesheet" href="/vendor/phosphor/regular/style.css">
    <link rel="stylesheet" href="/vendor/phosphor/fill/style.css">
    <link rel="stylesheet" href="/vendor/phosphor/bold/style.css">

    <!-- Tailwind CSS (compiled at build time) -->
    <link rel="stylesheet" href="/dist/tailwind.css">
    <style>
      :root { --mob-nav-h: 60px; }

      /* Mini player sits above the mobile nav */
      @media (max-width: 767px) {
        #mini-player {
          bottom: calc(var(--mob-nav-h) + env(safe-area-inset-bottom, 0px));
        }
      }

      /* Mobile nav absorbs safe area at the bottom */
      #mobile-nav {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }

      /* Main content: always clear the nav on mobile */
      @media (max-width: 767px) {
        #view {
          padding-bottom: calc(var(--mob-nav-h) + env(safe-area-inset-bottom, 0px) + 8px);
        }
        body.player-visible #view {
          padding-bottom: calc(var(--mob-nav-h) + env(safe-area-inset-bottom, 0px) + 90px + 8px);
        }
      }

      /* More sheet — plain CSS so Tailwind purge can't break it */
      #more-sheet { transform: translateY(100%); transition: transform 0.3s ease; }
      #more-sheet.open { transform: translateY(0); }
      #more-sheet-backdrop { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
      #more-sheet-backdrop.open { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-peel-bg text-peel-text font-sans h-screen w-full overflow-hidden flex flex-col selection:bg-peel-accent selection:text-white antialiased">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <div class="flex-1 flex overflow-hidden">

        <!-- Sidebar (Desktop) -->
        <aside id="sidebar" class="hidden md:flex flex-col bg-peel-bg border-r border-white/5 h-full pt-8 pb-28 user-select-none transition-[width] duration-200 ease-in-out w-64 overflow-hidden">
            <!-- Logo + collapse toggle -->
            <div id="sidebar-logo" class="flex items-center gap-3 px-5 mb-10 min-w-0">
                <button id="sidebar-toggle" class="w-8 h-8 rounded-full bg-peel-accent flex-shrink-0 flex items-center justify-center text-peel-bg shadow-[0_0_15px_rgba(255,159,28,0.4)] hover:bg-peel-accentHover transition-colors" title="Toggle sidebar">
                    <i class="ph-fill ph-vinyl-record text-xl"></i>
                </button>
                <h1 class="sidebar-label text-2xl font-bold tracking-tight whitespace-nowrap overflow-hidden transition-[opacity,max-width] duration-200">peel</h1>
            </div>

            <!-- Navigation -->
            <nav class="flex flex-col gap-1 flex-1 px-2" id="sidebar-nav">
                <button data-view="search" id="nav-search" class="nav-btn flex items-center gap-4 px-3 py-3 rounded-xl text-peel-muted hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium min-w-0">
                    <i class="ph ph-magnifying-glass text-2xl flex-shrink-0"></i>
                    <span class="sidebar-label whitespace-nowrap overflow-hidden transition-[opacity,max-width] duration-200">Search</span>
                </button>
                <button data-view="library" id="nav-library" class="nav-btn flex items-center gap-4 px-3 py-3 rounded-xl text-peel-muted hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium min-w-0">
                    <i class="ph ph-music-notes text-2xl flex-shrink-0"></i>
                    <span class="sidebar-label whitespace-nowrap overflow-hidden transition-[opacity,max-width] duration-200">Library</span>
                </button>
                <button data-view="liked" id="nav-liked" class="nav-btn flex items-center gap-4 px-3 py-3 rounded-xl text-peel-muted hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium min-w-0">
                    <i class="ph ph-heart text-2xl flex-shrink-0"></i>
                    <span class="sidebar-label whitespace-nowrap overflow-hidden transition-[opacity,max-width] duration-200">Favorites</span>
                </button>
                <button data-view="artists" id="nav-artists" class="nav-btn flex items-center gap-4 px-3 py-3 rounded-xl text-peel-muted hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium min-w-0">
                    <i class="ph ph-microphone-stage text-2xl flex-shrink-0"></i>
                    <span class="sidebar-label whitespace-nowrap overflow-hidden transition-[opacity,max-width] duration-200">Artists</span>
                </button>
                <button data-view="playlists" id="nav-playlists" class="nav-btn flex items-center gap-4 px-3 py-3 rounded-xl text-peel-muted hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium min-w-0">
                    <i class="ph ph-playlist text-2xl flex-shrink-0"></i>
                    <span class="sidebar-label whitespace-nowrap overflow-hidden transition-[opacity,max-width] duration-200">Playlists</span>
                </button>

                <div class="flex-1"></div>

                <button data-view="jobs" id="nav-jobs" class="nav-btn flex items-center gap-4 px-3 py-3 rounded-xl text-peel-muted hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium min-w-0">
                    <i class="ph ph-download-simple text-2xl flex-shrink-0"></i>
                    <span class="sidebar-label whitespace-nowrap overflow-hidden transition-[opacity,max-width] duration-200">Downloads</span>
                </button>
                <button data-view="settings" id="nav-settings" class="nav-btn flex items-center gap-4 px-3 py-3 rounded-xl text-peel-muted hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium min-w-0">
                    <i class="ph ph-gear text-2xl flex-shrink-0"></i>
                    <span class="sidebar-label whitespace-nowrap overflow-hidden transition-[opacity,max-width] duration-200">Settings</span>
                </button>
            </nav>
        </aside>

        <!-- Main Content Area — mobile bottom padding handled by CSS (body.player-visible) -->
        <main class="flex-1 overflow-y-auto h-full md:pb-28 relative w-full" id="view"></main>

    </div>

    <!-- Mobile Navigation Bar -->
    <nav id="mobile-nav" class="md:hidden fixed bottom-0 inset-x-0 z-40 bg-peel-bg/95 backdrop-blur-md border-t border-white/5 user-select-none">
        <div class="flex items-stretch h-[60px]">
            <button data-view="search" class="mob-nav-btn flex flex-col items-center justify-center gap-0.5 text-peel-muted flex-1">
                <i class="ph ph-magnifying-glass text-xl"></i>
                <span class="text-[9px] font-medium">Search</span>
            </button>
            <button data-view="library" class="mob-nav-btn flex flex-col items-center justify-center gap-0.5 text-peel-muted flex-1">
                <i class="ph ph-music-notes text-xl"></i>
                <span class="text-[9px] font-medium">Library</span>
            </button>
            <button data-view="artists" class="mob-nav-btn flex flex-col items-center justify-center gap-0.5 text-peel-muted flex-1">
                <i class="ph ph-microphone-stage text-xl"></i>
                <span class="text-[9px] font-medium">Artists</span>
            </button>
            <button data-view="playlists" class="mob-nav-btn flex flex-col items-center justify-center gap-0.5 text-peel-muted flex-1">
                <i class="ph ph-playlist text-xl"></i>
                <span class="text-[9px] font-medium">Playlists</span>
            </button>
            <button id="mob-nav-more" class="flex flex-col items-center justify-center gap-0.5 text-peel-muted flex-1">
                <i class="ph ph-dots-three text-xl"></i>
                <span class="text-[9px] font-medium">More</span>
            </button>
        </div>
    </nav>

    <!-- More Bottom Sheet -->
    <div id="more-sheet" class="md:hidden fixed inset-x-0 bottom-0 z-[46] bg-peel-surface rounded-t-3xl border-t border-white/10 shadow-2xl"
         style="padding-bottom: env(safe-area-inset-bottom, 0px)">
        <div class="w-10 h-1 bg-white/20 rounded-full mx-auto mt-3 mb-1"></div>
        <div class="px-3 pb-3">
            <button data-view="liked" class="more-sheet-btn w-full flex items-center gap-4 px-4 py-3 rounded-2xl hover:bg-white/5 active:bg-white/10 transition-colors text-left">
                <div class="w-10 h-10 rounded-xl bg-peel-accent/15 flex items-center justify-center flex-shrink-0">
                    <i class="ph ph-heart text-peel-accent text-xl"></i>
                </div>
                <span class="font-medium">Favorites</span>
            </button>
            <button data-view="jobs" class="more-sheet-btn w-full flex items-center gap-4 px-4 py-3 rounded-2xl hover:bg-white/5 active:bg-white/10 transition-colors text-left">
                <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center flex-shrink-0">
                    <i class="ph ph-download-simple text-peel-muted text-xl"></i>
                </div>
                <span class="font-medium">Downloads</span>
            </button>
            <button data-view="settings" class="more-sheet-btn w-full flex items-center gap-4 px-4 py-3 rounded-2xl hover:bg-white/5 active:bg-white/10 transition-colors text-left">
                <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center flex-shrink-0">
                    <i class="ph ph-gear text-peel-muted text-xl"></i>
                </div>
                <span class="font-medium">Settings</span>
            </button>
        </div>
    </div>
    <div id="more-sheet-backdrop" class="md:hidden fixed inset-0 z-[45] bg-black/60"></div>

    <!-- Player Bar (Fixed Bottom) -->
    <div id="mini-player" class="fixed bottom-0 w-full h-[90px] bg-peel-surface border-t border-white/5 z-50 items-center px-4 md:px-6 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] user-select-none hidden">

        <!-- Progress Bar (Absolute top of player) -->
        <div class="absolute top-0 left-0 w-full h-1 bg-peel-bg group cursor-pointer" id="player-progress">
            <div id="progressBar" class="h-full bg-peel-accent w-0 group-hover:bg-peel-accentHover transition-colors relative">
                <div class="absolute right-0 top-1/2 transform -translate-y-1/2 w-3 h-3 bg-white rounded-full opacity-0 group-hover:opacity-100 shadow-md"></div>
            </div>
        </div>

        <!-- Left: Track Info (grows to fill on mobile) -->
        <div class="flex items-center gap-3 flex-1 min-w-0 mr-4">
            <img id="mp-cover" alt="" class="w-12 h-12 md:w-14 md:h-14 rounded-md object-cover shadow-md flex-shrink-0 hidden sm:block">
            <div class="min-w-0">
                <h4 id="mp-title" class="text-sm font-semibold text-white truncate">Not Playing</h4>
                <p id="mp-artist" class="text-xs text-peel-muted truncate">Select a track</p>
            </div>
        </div>

        <!-- Center: Controls (fixed width, centered) -->
        <div class="flex items-center gap-4 flex-shrink-0">
            <button id="mp-prev" class="text-peel-muted hover:text-white transition-colors">
                <i class="ph-fill ph-skip-back text-2xl"></i>
            </button>
            <button id="mp-toggle" class="w-11 h-11 md:w-12 md:h-12 rounded-full bg-white text-peel-bg flex items-center justify-center hover:scale-105 transition-transform">
                <i id="playIcon" class="ph-fill ph-play text-xl md:text-2xl"></i>
            </button>
            <button id="mp-next" class="text-peel-muted hover:text-white transition-colors">
                <i class="ph-fill ph-skip-forward text-2xl"></i>
            </button>
        </div>

        <!-- Right: Like / Shuffle / Queue / Time (desktop only) + Close (always) -->
        <div class="flex items-center justify-end gap-3 md:w-52">
            <button id="mp-like" data-liked="false" class="hidden md:flex text-peel-muted hover:text-peel-accent transition-colors" title="Like">
                <i class="ph ph-heart text-xl"></i>
            </button>
            <button id="mp-shuffle" class="hidden md:flex text-peel-muted hover:text-white transition-colors" title="Shuffle">
                <i class="ph ph-shuffle text-xl"></i>
            </button>
            <button id="mp-queue-btn" class="hidden md:flex text-peel-muted hover:text-white transition-colors" title="Queue">
                <i class="ph ph-list text-xl"></i>
            </button>
            <span id="mp-time" class="hidden md:inline text-sm text-peel-muted tabular-nums">0:00 / 0:00</span>
            <button id="mp-close" class="text-peel-muted hover:text-white transition-colors flex-shrink-0" title="Close player">
                <i class="ph ph-x text-xl"></i>
            </button>
        </div>
    </div>

    <!-- Expanded Now-Playing View -->
    <div id="expanded-player"
         class="fixed inset-0 z-[150] flex flex-col translate-y-full transition-transform duration-300 ease-in-out pointer-events-none">
        <!-- Blurred album-art background -->
        <div id="ep-bg" class="absolute inset-0 bg-peel-bg bg-cover bg-center scale-110"
             style="filter:blur(48px) brightness(0.25)"></div>
        <div class="absolute inset-0 bg-black/50"></div>

        <!-- Content -->
        <div class="relative flex flex-col h-full w-full max-w-lg mx-auto px-8" style="padding-top:env(safe-area-inset-top,0px)">

            <!-- Top bar -->
            <div class="flex items-center justify-between py-5 flex-shrink-0">
                <button id="ep-close" class="w-10 h-10 flex items-center justify-center text-peel-muted hover:text-white transition-colors rounded-full hover:bg-white/10">
                    <i class="ph ph-caret-down text-2xl"></i>
                </button>
                <p class="text-sm font-semibold tracking-wide text-peel-muted uppercase">Now Playing</p>
                <button id="ep-dots" class="w-10 h-10 flex items-center justify-center text-peel-muted hover:text-white transition-colors rounded-full hover:bg-white/10">
                    <i class="ph ph-dots-three-vertical text-2xl"></i>
                </button>
            </div>

            <!-- Album art -->
            <div class="flex-1 flex items-center justify-center py-4 min-h-0">
                <img id="ep-cover" alt=""
                     class="w-full max-w-xs aspect-square rounded-2xl shadow-[0_20px_60px_rgba(0,0,0,0.6)] object-cover">
            </div>

            <!-- Track info + like -->
            <div class="flex items-center gap-4 mt-6 mb-5 flex-shrink-0">
                <div class="flex-1 min-w-0">
                    <h2 id="ep-title" class="text-2xl font-bold truncate">—</h2>
                    <p id="ep-artist" class="text-peel-muted mt-1 truncate">—</p>
                </div>
                <button id="ep-like" data-liked="false"
                        class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors flex-shrink-0 text-peel-muted">
                    <i class="ph ph-heart text-2xl"></i>
                </button>
            </div>

            <!-- Progress -->
            <div class="flex-shrink-0 mb-1">
                <div id="ep-progress-container"
                     class="w-full h-1.5 bg-white/15 rounded-full cursor-pointer group mb-2">
                    <div id="ep-progress-bar"
                         class="h-full bg-peel-accent rounded-full w-0 relative group-hover:bg-peel-accentHover transition-colors">
                        <div class="absolute right-0 top-1/2 -translate-y-1/2 -mr-2 w-4 h-4 bg-white rounded-full shadow opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    </div>
                </div>
                <div class="flex justify-between text-xs text-peel-muted">
                    <span id="ep-current">0:00</span>
                    <span id="ep-duration">0:00</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex items-center justify-between flex-shrink-0 mt-6 mb-10">
                <button id="ep-shuffle" class="w-11 h-11 flex items-center justify-center text-peel-muted hover:text-white transition-colors rounded-full hover:bg-white/10">
                    <i class="ph ph-shuffle text-2xl"></i>
                </button>
                <button id="ep-prev" class="w-11 h-11 flex items-center justify-center text-peel-muted hover:text-white transition-colors">
                    <i class="ph-fill ph-skip-back text-3xl"></i>
                </button>
                <button id="ep-toggle"
                        class="w-16 h-16 rounded-full bg-white text-peel-bg flex items-center justify-center hover:scale-105 transition-transform shadow-xl">
                    <i id="ep-play-icon" class="ph-fill ph-play text-2xl"></i>
                </button>
                <button id="ep-next" class="w-11 h-11 flex items-center justify-center text-peel-muted hover:text-white transition-colors">
                    <i class="ph-fill ph-skip-forward text-3xl"></i>
                </button>
                <button id="ep-queue" class="w-11 h-11 flex items-center justify-center text-peel-muted hover:text-white transition-colors rounded-full hover:bg-white/10">
                    <i class="ph ph-list text-2xl"></i>
                </button>
            </div>
        </div>
    </div>

    <audio id="audio" preload="metadata"></audio>

    <!-- Download Dialog -->
    <dialog id="download-dialog" class="bg-peel-surface text-peel-text border border-white/10 rounded-2xl p-6 w-[90vw] max-w-md shadow-2xl backdrop:bg-black/70 backdrop:backdrop-blur-sm">
        <form method="dialog">
            <h3 class="text-xl font-semibold mb-5 flex items-center gap-2">
                <i class="ph ph-download-simple text-peel-accent"></i>
                Download to library
            </h3>
            <label class="block mb-4">
                <span class="block text-sm text-peel-muted mb-1.5 font-medium">Artist</span>
                <input type="text" id="dl-artist" required placeholder="e.g. M83"
                       class="w-full bg-peel-bg text-peel-text placeholder-peel-muted rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-peel-accent/50 transition-all border border-white/10">
            </label>
            <label class="block mb-4">
                <span class="block text-sm text-peel-muted mb-1.5 font-medium">Title</span>
                <input type="text" id="dl-title" required placeholder="e.g. Midnight City"
                       class="w-full bg-peel-bg text-peel-text placeholder-peel-muted rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-peel-accent/50 transition-all border border-white/10">
            </label>
            <div class="flex gap-3 justify-end mt-6">
                <button value="cancel" formnovalidate class="px-5 py-2.5 bg-white/5 hover:bg-white/10 rounded-xl text-sm font-medium transition-colors">Cancel</button>
                <button id="dl-confirm" value="ok" class="px-5 py-2.5 bg-peel-accent hover:bg-peel-accentHover text-peel-bg rounded-xl text-sm font-semibold transition-colors">Download</button>
            </div>
        </form>
    </dialog>

    <!-- Queue Panel -->
    <div id="queue-panel"
         class="fixed inset-y-0 right-0 w-full sm:w-96 z-[160] flex flex-col bg-peel-surface border-l border-white/10 shadow-2xl translate-x-full transition-transform duration-300 ease-in-out">
        <div class="flex items-center justify-between px-5 py-4 border-b border-white/10 flex-shrink-0">
            <h2 class="text-base font-semibold">Queue</h2>
            <button id="queue-close" class="w-9 h-9 flex items-center justify-center text-peel-muted hover:text-white transition-colors rounded-full hover:bg-white/10">
                <i class="ph ph-x text-lg"></i>
            </button>
        </div>
        <div id="queue-list" class="flex-1 overflow-y-auto pb-6"></div>
    </div>
    <!-- Queue panel backdrop -->
    <div id="queue-backdrop" class="fixed inset-0 z-[155] bg-black/40 hidden"></div>

    <script type="module" src="app.js?v=2"></script>
    <script>
      // Apply correct nav active state immediately from localStorage (no flash)
      (function () {
        var lastView = localStorage.getItem('peel:last-view') || 'search';
        var MORE_VIEWS = ['liked', 'jobs', 'settings'];

        // Desktop sidebar
        var desktopBtn = document.getElementById('nav-' + lastView);
        if (desktopBtn) {
          desktopBtn.classList.remove('text-peel-muted');
          desktopBtn.classList.add('text-peel-text', 'bg-white/5');
        }

        // Mobile nav
        var moreBtn = document.getElementById('mob-nav-more');
        if (MORE_VIEWS.indexOf(lastView) !== -1) {
          if (moreBtn) { moreBtn.classList.remove('text-peel-muted'); moreBtn.classList.add('text-peel-accent'); }
        } else {
          document.querySelectorAll('.mob-nav-btn').forEach(function (btn) {
            if (btn.dataset.view === lastView) {
              btn.classList.remove('text-peel-muted');
              btn.classList.add('text-peel-accent');
              var icon = btn.querySelector('i');
              if (icon) icon.className = icon.className.replace(/\bph\b(?!-)/, 'ph-fill');
            }
          });
        }
      })();

      // More sheet — plain inline script, no module dependency
      (function () {
        var sheet = document.getElementById('more-sheet');
        var backdrop = document.getElementById('more-sheet-backdrop');
        if (!sheet || !backdrop) return;

        function openSheet() {
          sheet.classList.add('open');
          backdrop.classList.add('open');
        }
        function closeSheet() {
          sheet.classList.remove('open');
          backdrop.classList.remove('open');
        }

        document.getElementById('mob-nav-more').addEventListener('click', openSheet);
        backdrop.addEventListener('click', closeSheet);
        document.querySelectorAll('.more-sheet-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            closeSheet();
            if (typeof window.showView === 'function') window.showView(btn.dataset.view);
          });
        });
      })();

      // Sidebar collapse
      (function () {
        const sidebar = document.getElementById('sidebar');
        const toggle = document.getElementById('sidebar-toggle');
        if (!sidebar || !toggle) return;

        const COLLAPSED_KEY = 'peel:sidebar-collapsed';
        let collapsed = localStorage.getItem(COLLAPSED_KEY) === '1';

        function apply(animate) {
          if (!animate) sidebar.style.transition = 'none';
          if (collapsed) {
            sidebar.style.width = '64px';
            sidebar.querySelectorAll('.sidebar-label').forEach(el => {
              el.style.opacity = '0';
              el.style.maxWidth = '0';
            });
            toggle.title = 'Expand sidebar';
          } else {
            sidebar.style.width = '256px';
            sidebar.querySelectorAll('.sidebar-label').forEach(el => {
              el.style.opacity = '1';
              el.style.maxWidth = '200px';
            });
            toggle.title = 'Collapse sidebar';
          }
          if (!animate) requestAnimationFrame(() => { sidebar.style.transition = ''; });
        }

        apply(false);

        toggle.addEventListener('click', () => {
          collapsed = !collapsed;
          localStorage.setItem(COLLAPSED_KEY, collapsed ? '1' : '0');
          apply(true);
        });
      })();
    </script>
</body>
</html>
