<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peel - Self-Hosted Music</title>
    <meta name="description" content="Search YouTube, download, and stream your personal music library.">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        peel: {
                            bg: '#121212',
                            surface: '#1E1E1E',
                            accent: '#FF9F1C',
                            accentHover: '#FFBF69',
                            success: '#2EC4B6',
                            text: '#FFFFFF',
                            muted: '#B3B3B3',
                        }
                    },
                    animation: {
                        'spin-slow': 'spin 1.5s linear infinite',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(100%)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar for a premium feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Hide scrollbar for clean lists but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Prevent text selection on UI elements */
        .user-select-none { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="bg-peel-bg text-peel-text font-sans h-screen w-full overflow-hidden flex flex-col selection:bg-peel-accent selection:text-white antialiased">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <div class="flex-1 flex overflow-hidden">

        <!-- Sidebar (Desktop) -->
        <aside class="hidden md:flex flex-col w-64 bg-peel-bg border-r border-white/5 h-full pt-8 pb-28 px-4 user-select-none">
            <!-- Logo -->
            <div class="flex items-center gap-3 px-4 mb-10 cursor-pointer">
                <div class="w-8 h-8 rounded-full bg-peel-accent flex items-center justify-center text-peel-bg shadow-[0_0_15px_rgba(255,159,28,0.4)]">
                    <i class="ph-fill ph-vinyl-record text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">peel</h1>
            </div>

            <!-- Navigation -->
            <nav class="flex flex-col gap-1 flex-1" id="sidebar-nav">
                <button data-view="search" id="nav-search" class="nav-btn flex items-center gap-4 px-4 py-3 rounded-xl text-peel-text bg-white/5 hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium">
                    <i class="ph ph-magnifying-glass text-2xl"></i>
                    Search
                </button>
                <button data-view="library" id="nav-library" class="nav-btn flex items-center gap-4 px-4 py-3 rounded-xl text-peel-muted hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium">
                    <i class="ph ph-music-notes text-2xl"></i>
                    Library
                </button>

                <p class="px-4 pt-4 pb-1 text-[10px] font-semibold text-peel-muted uppercase tracking-widest">Your Library</p>

                <button data-view="liked" id="nav-liked" class="nav-btn flex items-center gap-4 px-4 py-3 rounded-xl text-peel-muted hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium">
                    <i class="ph ph-heart text-2xl"></i>
                    Liked Songs
                </button>
                <button data-view="artists" id="nav-artists" class="nav-btn flex items-center gap-4 px-4 py-3 rounded-xl text-peel-muted hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium">
                    <i class="ph ph-microphone-stage text-2xl"></i>
                    Artists
                </button>
                <button data-view="playlists" id="nav-playlists" class="nav-btn flex items-center gap-4 px-4 py-3 rounded-xl text-peel-muted hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium">
                    <i class="ph ph-playlist text-2xl"></i>
                    Playlists
                </button>

                <div class="flex-1"></div>

                <button data-view="jobs" id="nav-jobs" class="nav-btn flex items-center gap-4 px-4 py-3 rounded-xl text-peel-muted hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium">
                    <i class="ph ph-download-simple text-2xl"></i>
                    Downloads
                </button>
                <button data-view="settings" id="nav-settings" class="nav-btn flex items-center gap-4 px-4 py-3 rounded-xl text-peel-muted hover:text-peel-text hover:bg-white/5 transition-all text-left font-medium">
                    <i class="ph ph-gear text-2xl"></i>
                    Settings
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto h-full pb-32 relative w-full" id="view"></main>

    </div>

    <!-- Mobile Navigation Bar -->
    <nav class="md:hidden fixed bottom-[90px] w-full bg-peel-bg/95 backdrop-blur-md border-t border-white/5 z-40 px-2 py-3 flex justify-between items-center user-select-none" id="mobile-nav">
        <button data-view="search" class="mob-nav-btn flex flex-col items-center gap-1 text-peel-accent flex-1">
            <i class="ph-fill ph-magnifying-glass text-xl transition-all"></i>
            <span class="text-[9px] font-medium">Search</span>
        </button>
        <button data-view="library" class="mob-nav-btn flex flex-col items-center gap-1 text-peel-muted flex-1">
            <i class="ph ph-music-notes text-xl transition-all"></i>
            <span class="text-[9px] font-medium">Library</span>
        </button>
        <button data-view="liked" class="mob-nav-btn flex flex-col items-center gap-1 text-peel-muted flex-1">
            <i class="ph ph-heart text-xl transition-all"></i>
            <span class="text-[9px] font-medium">Liked</span>
        </button>
        <button data-view="artists" class="mob-nav-btn flex flex-col items-center gap-1 text-peel-muted flex-1">
            <i class="ph ph-microphone-stage text-xl transition-all"></i>
            <span class="text-[9px] font-medium">Artists</span>
        </button>
        <button data-view="playlists" class="mob-nav-btn flex flex-col items-center gap-1 text-peel-muted flex-1">
            <i class="ph ph-playlist text-xl transition-all"></i>
            <span class="text-[9px] font-medium">Playlists</span>
        </button>
    </nav>

    <!-- Player Bar (Fixed Bottom) -->
    <div id="mini-player" class="fixed bottom-0 w-full h-[90px] bg-peel-surface border-t border-white/5 z-50 items-center justify-between px-4 md:px-6 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] user-select-none hidden">

        <!-- Progress Bar (Absolute top of player) -->
        <div class="absolute top-0 left-0 w-full h-1 bg-peel-bg group cursor-pointer" id="player-progress">
            <div id="progressBar" class="h-full bg-peel-accent w-0 group-hover:bg-peel-accentHover transition-colors relative">
                <!-- Playhead dot appears on hover -->
                <div class="absolute right-0 top-1/2 transform -translate-y-1/2 w-3 h-3 bg-white rounded-full opacity-0 group-hover:opacity-100 shadow-md"></div>
            </div>
        </div>

        <!-- Left: Track Info -->
        <div class="flex items-center gap-4 w-1/3 min-w-0">
            <img id="mp-cover" alt="Now Playing" class="w-14 h-14 rounded-md object-cover shadow-md hidden sm:block">
            <div class="min-w-0">
                <h4 id="mp-title" class="text-sm md:text-base font-semibold text-white truncate">Not Playing</h4>
                <p id="mp-artist" class="text-xs md:text-sm text-peel-muted truncate">Select a track</p>
            </div>
        </div>

        <!-- Center: Controls -->
        <div class="flex flex-col items-center justify-center w-1/3">
            <div class="flex items-center gap-4 md:gap-6">
                <button id="mp-prev" class="text-peel-muted hover:text-white transition-colors"><i class="ph-fill ph-skip-back text-2xl md:text-3xl"></i></button>

                <button id="mp-toggle" class="w-12 h-12 md:w-14 md:h-14 rounded-full bg-white text-peel-bg flex items-center justify-center hover:scale-105 transition-transform">
                    <i id="playIcon" class="ph-fill ph-play text-2xl"></i>
                </button>

                <button id="mp-next" class="text-peel-muted hover:text-white transition-colors"><i class="ph-fill ph-skip-forward text-2xl md:text-3xl"></i></button>
            </div>
        </div>

        <!-- Right: Like / Shuffle / Time -->
        <div class="flex items-center justify-end gap-3 w-1/3">
            <button id="mp-like" data-liked="false"
                    class="text-peel-muted hover:text-peel-accent transition-colors hidden md:block"
                    title="Like">
                <i class="ph ph-heart text-xl"></i>
            </button>
            <button id="mp-shuffle" class="text-peel-muted hover:text-white transition-colors hidden md:block"
                    title="Shuffle">
                <i class="ph ph-shuffle text-xl"></i>
            </button>
            <span id="mp-time" class="text-sm text-peel-muted tabular-nums hidden md:block">0:00 / 0:00</span>
        </div>
    </div>

    <audio id="audio" preload="metadata"></audio>

    <!-- Download Dialog -->
    <dialog id="download-dialog" class="bg-peel-surface text-peel-text border border-white/10 rounded-2xl p-6 min-w-[340px] max-w-[90vw] shadow-2xl backdrop:bg-black/70 backdrop:backdrop-blur-sm">
        <form method="dialog">
            <h3 class="text-xl font-semibold mb-5 flex items-center gap-2">
                <i class="ph ph-download-simple text-peel-accent"></i>
                Download to library
            </h3>
            <label class="block mb-4">
                <span class="block text-sm text-peel-muted mb-1.5 font-medium">Artist</span>
                <input type="text" id="dl-artist" required placeholder="e.g. M83"
                       class="w-full bg-peel-bg text-peel-text placeholder-peel-muted rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-peel-accent/50 transition-all border border-white/10">
            </label>
            <label class="block mb-4">
                <span class="block text-sm text-peel-muted mb-1.5 font-medium">Title</span>
                <input type="text" id="dl-title" required placeholder="e.g. Midnight City"
                       class="w-full bg-peel-bg text-peel-text placeholder-peel-muted rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-peel-accent/50 transition-all border border-white/10">
            </label>
            <div class="flex gap-3 justify-end mt-6">
                <button value="cancel" class="px-5 py-2.5 bg-white/5 hover:bg-white/10 rounded-xl text-sm font-medium transition-colors">Cancel</button>
                <button id="dl-confirm" value="ok" class="px-5 py-2.5 bg-peel-accent hover:bg-peel-accentHover text-peel-bg rounded-xl text-sm font-semibold transition-colors">Download</button>
            </div>
        </form>
    </dialog>

    <script type="module" src="app.js"></script>
</body>
</html>
