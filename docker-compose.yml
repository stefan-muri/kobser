services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: peel-navidrome
    restart: unless-stopped
    ports:
      - "${NAVIDROME_PORT:-4533}:4533"
    volumes:
      - ${MUSIC_DIR:-./data/music}:/music:ro
      - ./data/navidrome:/data
    environment:
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_SCANSCHEDULE: "0"
      ND_ENABLEINSIGHTSCOLLECTOR: "false"
    networks:
      - peel

  middleware:
    build: ./middleware
    container_name: peel-middleware
    restart: unless-stopped
    ports:
      - "${PEEL_PORT:-8000}:8000"
    volumes:
      - ${MUSIC_DIR:-./data/music}:/music
      - ./secrets:/app/secrets:ro
      - ./data/peel:/app/data
    environment:
      NAVIDROME_URL: http://navidrome:4533
      MUSIC_DIR: /music
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
    networks:
      - peel

networks:
  peel:
    driver: bridge
