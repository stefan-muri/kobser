services:
  navidrome:
    profiles: [full]
    image: deluan/navidrome:latest
    container_name: kobser-navidrome
    restart: unless-stopped
    ports:
      - "${NAVIDROME_PORT:-4533}:4533"
    volumes:
      - ${MUSIC_DIR:-./data/music}:/music:ro
      - ./data/navidrome:/data
    environment:
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_SCANSCHEDULE: "0"
      ND_ENABLEINSIGHTSCOLLECTOR: "false"
    networks:
      - kobser

  middleware:
    image: ghcr.io/stefan-muri/kobser:latest
    container_name: kobser-middleware
    restart: unless-stopped
    ports:
      - "${KOBSER_PORT:-8000}:8000"
    volumes:
      - ${MUSIC_DIR:-./data/music}:/music
      - ./secrets:/app/secrets:ro
      - ./data/kobser:/app/data
    environment:
      NAVIDROME_URL: ${NAVIDROME_URL:-http://navidrome:4533}
      MUSIC_DIR: /music
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
    networks:
      - kobser

networks:
  kobser:
    driver: bridge
