name: Build Android APK

on:
  push:
    branches: [master]
    paths:
      - "android/**"
      - ".github/workflows/android-build.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk kobser.apk

      - name: Publish APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Attach (or replace) the APK on the release that was just published.
            gh release upload "${{ github.event.release.tag_name }}" kobser.apk --clobber
          else
            # Rolling prerelease holding the newest debug build from master.
            gh release delete latest --yes --cleanup-tag 2>/dev/null || true
            gh release create latest kobser.apk \
              --title "Latest Build" \
              --notes "Debug APK built automatically from the latest commit on master. Enable **Install from unknown sources** on your device, then open the file to install." \
              --prerelease
          fi
