name: Middleware CI

on:
  push:
    branches: [master]
    paths:
      - "middleware/**"
      - ".github/workflows/middleware-ci.yml"
  pull_request:
    paths:
      - "middleware/**"
      - ".github/workflows/middleware-ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: middleware

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: middleware/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q
